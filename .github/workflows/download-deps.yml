name: Offline Cargo Vendor

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖 (OpenSSL 等)
        # 这一步是关键，解决 Linux 下编译报错
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 执行 Vendor (下载所有依赖)
        run: cargo vendor --versioned-dirs vendor

      - name: 压缩依赖包
        run: tar -czvf rust-vendor.tar.gz vendor

      - name: 上传制品 (供下载)
        uses: actions/upload-artifact@v4
        with:
          name: openwork-rust-deps
          path: rust-vendor.tar.gz
